<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>フライト時刻表検索</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: url('/images/ana-777.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            text-align: center;
        }

        h1 {
            margin-top: 60px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        form {
            margin-top: 40px;
            display: inline-block;
            padding: 20px 30px;
            background-color: rgba(0,0,0,0.6);
            border-radius: 12px;
        }

        label {
            font-size: 1.2em;
            margin-right: 10px;
        }

        select {
            padding: 8px;
            font-size: 1em;
            border-radius: 6px;
            border: none;
        }

        button {
            margin-left: 15px;
            padding: 8px 20px;
            font-size: 1em;
            border: none;
            border-radius: 6px;
            background-color: #0078d7;
            color: #fff;
            cursor: pointer;
        }

        button:hover {
            background-color: #005a9e;
        }
    </style>
</head>
<body>
    <h1>フライト時刻表検索<br>Flight Timetable Search</h1>
    <form action="/flights" method="get">
        <label for="airport">空港を選択: </label>
        <select name="airport" id="airport">
            <option value="HND">羽田空港 (HND)</option>
            <option value="NRT">成田空港 (NRT)</option>
            <option value="ITM">伊丹空港 (ITM)</option>
            <option value="KIX">関西国際空港 (KIX)</option>
            <option value="CTS">新千歳空港 (CTS)</option>
            <option value="NGO">中部国際空港 (NGO)</option>
            <option value="FUK">福岡空港 (FUK)</option>
            <option value="OKA">那覇空港 (OKA)</option>
        </select>
        
        <button type="submit">検索<br>Search</button>
    </form>
</body>
</html>
